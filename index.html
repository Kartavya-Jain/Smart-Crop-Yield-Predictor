<!DOCTYPE html>
<html>
<body>
<link rel="stylesheet" type="text/css" href="style.css">
<div class="header">
    <img src="Logo.png" class="logo">
    <div class="header-text">
        <h1>Smart Crop Yield Predictor</h1>
    </div>
</div>
<div class="div">
<label for="country">Select Country</label><br>
<select id="country"></select>
<br><br>
<button onclick="goNext()">Next</button>
</div>
<script>
    function formatName(name){
        return name.replace(/\b\w/g,function(l){
            return l.toUpperCase();
        });
    }
    fetch("http://127.0.0.1:8000/countries")
    .then (function(res){
        return res.json();
    })
    .then (function(data){
        var select=document.getElementById("country");
        for(var i=0;i<data.countries.length;i++){
            var option=document.createElement("option");
            option.value=data.countries[i];
            option.innerHTML=formatName(data.countries[i]);
            select.appendChild(option);
        }
    })
    function goNext(){
        var country=document.getElementById("country").value;
        localStorage.setItem("country",country);
        window.location.href="Crop_dropdown.html";
    }
</script>
</body>
</html>
